<script>
    // Funzione richiamata da "SLIDER" ---> fa comparire/scomparire anelli
    function applySliderFilter(val) {
        const value = parseInt(val);
        const yearDisplay = document.getElementById("yearDisplay");
        const century = [" 1 Century", "2 Century", "3 Century", "4 Century", "5 Century", "6 Century"];
        yearDisplay.innerText = century[value];

        if (yearDisplay) yearDisplay.innerText = century[value];
        if (window.APP && APP.baseRings) {
            APP.baseRings.forEach(nRing => {
                // Se l'id dell'anello è minore o uguale al valore dello slider, mostralo
                if (nRing.userData.id_ring <= value) {
                    nRing.show();
                } else {
                    nRing.hide();
                }
            });
        }
    }
</script>

<script>
    //Definizione funzione richiamata da "RESET" ---> ripristina visualizzazione iniziale - da rivedere e completare
    function resetView() {
        // 1. Ripristina la telecamera alla posizione iniziale
        if (window.ATON) {
            const controls = ATON.getControls(); 
            if (controls) controls.reset(); 
        }
        // 2. Reset UI: visualizzazione anelli
        const slider = document.getElementById("centurySlider");
        const display = document.getElementById("yearDisplay");
            
        if (slider) {
            slider.value = 4; // Riporta graficamente lo slider al massimo
            // Usiamo la funzione esistente per aggiornare la scena 3D in base allo slider
            if (typeof applySliderFilter === "function") {
                applySliderFilter(4); 
            }
        }
        if (display) {
            display.innerText = "V Century";
        }

        // --- 3. Reset UI: Checkbox ---
        // Seleziona tutti i checkbox dentro la sidebar
        const checkboxes = document.querySelectorAll('.filter-list input[type="checkbox"]');
            
        checkboxes.forEach(cb => {
            cb.checked = true; // Li rimette tutti su "selezionato"
            // 2. Ripristina oggetti 3D
            const name = cb.value;
                
            if (window.APP && APP.baseRings) {
                APP.baseRings.forEach(nRing => {
                    // Controlla se il nome corrisponde
                    if (nRing.userData.nome === name){
                        nRing.show(); // Mostra l'anello
                        // 3. Ripristina opacità iniziale
                    if (nRing.userData.material) {
                            nRing.userData.material.opacity = nRing.userData.opacityOriginal || 1;
                        }
                    }
                });
            }
        });  
        console.log("Visualizzazione e filtri ripristinati.");
    }  
</script>

<script>
    // Definizione funzione richiamata da "SEARCH" nel main dock ---> apre barra di ricerca
    function toggleSearch() {
        const overlay = document.getElementById("searchOverlay");
        if (!overlay) return; // Evita errori se l'elemento non esiste
            
        // Attiva o disattiva la classe 'active'
        overlay.classList.toggle("active");

        // Se aperta, metti il focus sull'input
        if (overlay.classList.contains("active")) {
            // Usiamo setTimeout per dare tempo al CSS di renderizzare l'elemento
            setTimeout(() => {
                const input = overlay.querySelector("input");
                if (input) input.focus();
            }, 50);
            // Opzionale: blocca lo scroll della pagina sotto il popup
            document.body.style.overflow = 'hidden';
        } else {
            // Ripristina lo scroll quando chiudi
            document.body.style.overflow = 'auto';
        }
    }   

    // Barra ricerca - Chiudi premendo il tasto ESC + controllo sicurezza
    window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            const overlay = document.getElementById("searchOverlay");
            if (overlay && overlay.classList.contains("active")) {
                overlay.classList.remove("active");
                document.body.style.overflow = 'auto';
            }
        }
    });
        
    // Barra ricerca - Chiudi cliccando su nero
    window.onclick = function(event) {
        const overlay = document.getElementById("searchOverlay");
        if (event.target == overlay) {
            overlay.classList.remove("active");
        }
    }
</script>
    
<script>
    function updateSlider() {
        const minInput = document.getElementById('min-range');
        const maxInput = document.getElementById('max-range');
        const labelMin = document.getElementById('label-min');
        const labelMax = document.getElementById('label-max');

        // Valori correnti dello slider
        let valMin = parseInt(minInput.value);
        let valMax = parseInt(maxInput.value);

        // Impedisce l'incrocio dei cursori
        if (valMin > valMax) {
            minInput.value = valMax;
            valMin = valMax;
        }
        if (valMax < valMin) {
            maxInput.value = valMin;
            valMax = valMin;
        }

        // Aggiorna etichette testuali
        labelMin.innerText = valMin;
        labelMax.innerText = valMax;

        // --- LOGICA DI COLLEGAMENTO AGLI ANELLI ---
        // Cicliamo su tutti gli anelli definiti nella configurazione
        baseRingsLayers.forEach((layer) => {
            // Troviamo l'oggetto 3D/Grafico corrispondente nell'array APP.baseRings
            // Assumendo che APP.baseRings[0] corrisponda a id_ring: 0
            const ringNode = APP.baseRings[layer.id_ring];

            if (ringNode) {
                // Se l'id dell'anello è compreso nel range dello slider, mostralo
                if (layer.id_ring >= valMin && layer.id_ring <= valMax) {
                    ringNode.visible = true; // Per Three.js
                    // Se usi CSS/DOM usa: ringNode.style.display = "block";
                } else {
                    ringNode.visible = false; // Nascondi l'anello
                    // Se usi CSS/DOM usa: ringNode.style.display = "none";
                }
            }
        });
    }
</script>
